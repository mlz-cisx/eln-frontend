<div>
  <label for="x-axis-select" style="margin-right: 20px;">Select X-axis:</label>
  <select
    id="x-axis-select"
    [(ngModel)]="selectedXasix"
    (change)="onChangeXaxis()"
  >
    <option *ngFor="let header of headers" [value]="header">{{ header }}</option>
  </select>
</div>
<plotly-plot #plot [config]="{ displaylogo: false, modeBarButtonsToRemove: ['select2d','lasso2d'] }"
             [data]="plotData"></plotly-plot>
<div *ngIf="showSketchButton">
  <button (click)="exportPlotAsImage()"
          class="btn mlzeln-button-regular mlzeln-button-outline"
          type="button">Sketch from Plot Image
  </button>
</div>
